name: 'Full CI/CD'

on:
  push:
    branches: [ "main" ]

jobs:
  changes:
    name: '1. Detectar Alterações'
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            terraform: ['terraform/**']
            k8s: ['k8s/**']
  
  terraform:
    name: '2. Infraestrutura'
    needs: [changes]
    if: needs.changes.outputs.terraform == 'true' || github.run_number == 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

  setup-env:
    name: '3. Auto-Discovery & Secrets'
    needs: [terraform]
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      # Nomes simplificados para evitar bloqueio de "secret" do GitHub
      acrname: ${{ steps.get_data.outputs.acrname }}
      acrserver: ${{ steps.get_data.outputs.acrserver }}
      face_endpoint: ${{ steps.get_data.outputs.face_endpoint }}
      face_key: ${{ steps.get_data.outputs.face_key }}
      stname: ${{ steps.get_data.outputs.stname }}
      stconn: ${{ steps.get_data.outputs.stconn }}
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Get Resources Data
        id: get_data
        run: |
          RG="rg-${{ secrets.PREFIX }}-prod"
          echo "Buscando recursos no RG: $RG"

          # Coleta de dados via Azure CLI
          ACR_NAME=$(az acr list -g $RG --query "[0].name" -o tsv)
          ACR_SERVER=$(az acr list -g $RG --query "[0].loginServer" -o tsv)
          ST_NAME=$(az storage account list -g $RG --query "[0].name" -o tsv)
          ST_CONN=$(az storage account show-connection-string -g $RG -n $ST_NAME --query connectionString -o tsv)
          FACE_NAME="${{ secrets.PREFIX }}-ai-face2"
          FACE_ENDPOINT=$(az cognitiveservices account show -n $FACE_NAME -g $RG --query properties.endpoint -o tsv)
          FACE_KEY=$(az cognitiveservices account keys list -n $FACE_NAME -g $RG --query key1 -o tsv)

          # O PULO DO GATO: Aspas simples protegem os caracteres ';' e '&' da Connection String
          echo "ACR_NAME='$ACR_NAME'" > azure.env
          echo "ACR_SERVER='$ACR_SERVER'" >> azure.env
          echo "ST_NAME='$ST_NAME'" >> azure.env
          echo "ST_CONN='$ST_CONN'" >> azure.env
          echo "FACE_ENDPOINT='$FACE_ENDPOINT'" >> azure.env
          echo "FACE_KEY='$FACE_KEY'" >> azure.env
          
          echo "Arquivo azure.env gerado com proteção de caracteres especiais."

      - name: Upload das Variáveis
        uses: actions/upload-artifact@v4
        with:
          name: azure-vars
          path: azure.env
          retention-days: 1

  ci-qa-build:
    name: '4. CI: QA & Docker Build'
    needs: [setup-env]
    if: always() && needs.setup-env.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download das Variáveis
        uses: actions/download-artifact@v4
        with:
          name: azure-vars

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Lint & Testes
        env:
          FACE_API_ENDPOINT: "https://dummy.cognitiveservices.azure.com/"
          FACE_API_KEY: "00000000000000000000000000000000"
          STORAGE_ACCOUNT_NAME: "dummystorage"
          STORAGE_CONTAINER_NAME: "validated-faces"
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=dummy;AccountKey=dummykey;EndpointSuffix=core.windows.net"
        run: |
          pip install flake8 pytest pytest-asyncio httpx -r app/requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)/app
          pytest
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Build and Push
        run: |
          # Carrega as variáveis reais do arquivo baixado
          source azure.env
          
          echo "Fazendo login no ACR: $ACR_NAME"
          az acr login --name "$ACR_NAME"
          
          echo "Gerando imagem: $ACR_SERVER/face-detection-quality:latest"
          docker build -t "$ACR_SERVER/face-detection-quality:latest" .
          docker push "$ACR_SERVER/face-detection-quality:latest"

  cd-deploy:
    name: '5. CD: Deploy AKS'
    needs: [ci-qa-build]
    if: always() && needs.ci-qa-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Baixa o arquivo com as variáveis reais (ACR_SERVER, ST_CONN, etc)
      - name: Download das Variáveis
        uses: actions/download-artifact@v4
        with:
          name: azure-vars

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: "rg-${{ secrets.PREFIX }}-prod"
          cluster-name: "${{ secrets.PREFIX }}-aks"

      # 2. Sincroniza Secrets usando o arquivo baixado
      - name: Sync K8s Secrets
        run: |
          # 1. Carrega as variáveis protegidas do arquivo
          source azure.env
          
          echo "Injetando chaves reais e completas no cluster..."
          
          # 3. Cria o segredo usando chaves ${} para garantir a leitura total da string
          kubectl create secret generic face-api-secrets \
            --from-literal=FACE_API_ENDPOINT="${FACE_ENDPOINT}" \
            --from-literal=FACE_API_KEY="${FACE_KEY}" \
            --from-literal=STORAGE_ACCOUNT_NAME="${ST_NAME}" \
            --from-literal=STORAGE_CONTAINER_NAME="validated-faces" \
            --from-literal=AZURE_STORAGE_CONNECTION_STRING="${ST_CONN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # 3. Aplica Manifestos com substituição de variáveis
      - name: Prepare and Apply Manifests
        run: |
          source azure.env
          
          # Exporta para o envsubst conseguir ler
          export ACR_LOGIN_SERVER=$ACR_SERVER
          
          echo "Deploying to AKS with image from: $ACR_LOGIN_SERVER"
          
          # Injeta o valor do ACR no deployment.yaml e aplica
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml

      # 4. Força o Rollout e aguarda a saúde dos pods
      - name: Force Rollout (Update Image)
        run: |
          az aks get-credentials --resource-group "rg-${{ secrets.PREFIX }}-prod" --name "${{ secrets.PREFIX }}-aks" --overwrite-existing
          
          echo "Reiniciando pods para garantir nova imagem..."
          kubectl rollout restart deployment face-quality-api
          
          # Timeout de 90s para evitar travamento eterno se a imagem estiver errada
          kubectl rollout status deployment face-quality-api --timeout=90s

name: 'Full CI/CD'

on:
  push:
    branches: [ "main" ]

jobs:
  changes:
    name: '1. Detectar Alterações'
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            terraform: ['terraform/**']
            k8s: ['k8s/**']
  
  terraform:
    name: '2. Infraestrutura'
    needs: [changes]
    if: needs.changes.outputs.terraform == 'true' || github.run_number == 1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

  setup-env:
    name: '3. Auto-Discovery & Secrets'
    needs: [terraform]
    # Garante que roda mesmo que o terraform seja 'skipped' (quando não há mudanças na infra)
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      acr_name: ${{ steps.get_data.outputs.acr_name }}
      acr_server: ${{ steps.get_data.outputs.acr_server }}
      face_endpoint: ${{ steps.get_data.outputs.face_endpoint }}
      face_key: ${{ steps.get_data.outputs.face_key }}
      st_name: ${{ steps.get_data.outputs.st_name }}
      st_conn: ${{ steps.get_data.outputs.st_conn }}
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Get Resources Data
        id: get_data
        run: |
          # 1. Definir o Resource Group para evitar repetição
          RG="rg-${{ secrets.PREFIX }}-prod"

          # 2. ACR
          ACR_NAME=$(az acr list -g $RG --query "[0].name" -o tsv)
          ACR_SERVER=$(az acr list -g $RG --query "[0].loginServer" -o tsv)
          
          # 3. Storage - Aqui está o provável erro
          ST_NAME=$(az storage account list -g $RG --query "[0].name" -o tsv)
          
          ST_CONN=$(az storage account show-connection-string -g $RG -n $ST_NAME --query connectionString -o tsv)
          
          # 4. Face API (Lembrando do nome face2 que você mudou)
          FACE_NAME="${{ secrets.PREFIX }}-ai-face2"
          
          FACE_ENDPOINT=$(az cognitiveservices account show -n $FACE_NAME -g $RG --query properties.endpoint -o tsv)
          FACE_KEY=$(az cognitiveservices account keys list -n $FACE_NAME -g $RG --query key1 -o tsv)

          # 5. Exportação para o GitHub Actions
          # Exportação com Base64 para evitar que o GitHub bloqueie por "achar" que é segredo
          echo "acr_name=$(echo -n $ACR_NAME | base64)" >> $GITHUB_OUTPUT
          echo "acr_server=$(echo -n $ACR_SERVER | base64)" >> $GITHUB_OUTPUT
          echo "face_endpoint=$FACE_ENDPOINT" >> $GITHUB_OUTPUT
          echo "face_key=$FACE_KEY" >> $GITHUB_OUTPUT
          echo "st_name=$ST_NAME" >> $GITHUB_OUTPUT
          echo "st_conn=$(echo -n $ST_CONN | base64)" >> $GITHUB_OUTPUT

  ci-qa-build:
    name: '4. CI: QA & Docker Build'
    needs: [setup-env]
    if: always() && needs.setup-env.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Lint & Testes
        env:
          # Variáveis de ambiente fake para os testes rodarem sem acesso à Azure
          FACE_API_ENDPOINT: "https://dummy.cognitiveservices.azure.com/"
          FACE_API_KEY: "00000000000000000000000000000000"
          STORAGE_ACCOUNT_NAME: "dummystorage"
          STORAGE_CONTAINER_NAME: "validated-faces"
          # String de conexão fake mas com formato válido para o SDK não reclamar no import
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=dummy;AccountKey=dummykey;EndpointSuffix=core.windows.net"
        run: |
          pip install flake8 pytest pytest-asyncio httpx -r app/requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)/app
          pytest
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Build and Push
        env:
          ACR_NAME: ${{ needs.setup-env.outputs.acr_name }}
          ACR_SERVER: ${{ needs.setup-env.outputs.acr_server }}
        run: |
          # Transforma de volta em texto legível
          ACR_NAME=$(echo $ACR_NAME_RAW | base64 -d)
          ACR_SERVER=$(echo $ACR_SERVER_RAW | base64 -d)
          
          az acr login --name "$ACR_NAME"
          
          echo "Buildando imagem..."
          docker build -t "$ACR_SERVER/face-detection-quality:latest" .
          
          echo "Fazendo push..."
          docker push "$ACR_SERVER/face-detection-quality:latest"

  cd-deploy:
    name: '5. CD: Deploy AKS'
    needs: [ci-qa-build]
    if: always() && needs.ci-qa-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context & DNS
        if: needs.changes.outputs.k8s == 'true'
        uses: azure/aks-set-context@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: "rg-${{ secrets.PREFIX }}-prod"
          cluster-name: "${{ secrets.PREFIX }}-aks"

      - name: Sync K8s Secrets
        if: needs.changes.outputs.k8s == 'true'
        run: |
          kubectl create secret generic face-api-secrets \
            --from-literal=FACE_API_ENDPOINT="${{ needs.setup-env.outputs.face_endpoint }}" \
            --from-literal=FACE_API_KEY="${{ needs.setup-env.outputs.face_key }}" \
            --from-literal=STORAGE_ACCOUNT_NAME="${{ needs.setup-env.outputs.st_name }}" \
            --from-literal=STORAGE_CONTAINER_NAME="validated-faces" \
            --from-literal=AZURE_STORAGE_CONNECTION_STRING="${{ needs.setup-env.outputs.st_conn }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Prepare and Apply Manifests
        if: needs.changes.outputs.k8s == 'true'
        run: |
          export ACR_LOGIN_SERVER="${{ needs.setup-env.outputs.acr_server }}"
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml

      - name: Force Rollout (Update Image)
        run: |
          # Garante o contexto para o restart
          az aks get-credentials --resource-group "rg-${{ secrets.PREFIX }}-prod" --name "${{ secrets.PREFIX }}-aks" --overwrite-existing
          
          echo "🔄 Reiniciando pods..."
          kubectl rollout restart deployment face-quality-api
          kubectl rollout status deployment face-quality-api --timeout=90s
